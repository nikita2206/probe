name: Index Benchmark

on:
  push:
    branches: [ master ]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BENCHMARK_ARTIFACT_NAME: java-index-benchmark
  BENCHMARK_RESULT_PATH: benchmark-results/java-index-benchmark.json

jobs:
  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run full Java indexing benchmark
        run: |
          cargo build --release --locked
          python3 scripts/run_index_benchmark.py \
            --probe-binary target/release/probe \
            --output "${BENCHMARK_RESULT_PATH}"

      - name: Render benchmark summary
        id: render-summary
        env:
          CURRENT_BENCHMARK_JSON: ${{ env.BENCHMARK_RESULT_PATH }}
        run: python3 scripts/render_benchmark_report.py

      - name: Add benchmark summary to job summary
        run: |
          printf '%s\n' "${{ steps.render-summary.outputs.report }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BENCHMARK_ARTIFACT_NAME }}
          path: ${{ env.BENCHMARK_RESULT_PATH }}
          retention-days: 90

  compare-and-update-pr:
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      actions: read
      contents: read
      pull-requests: write

    steps:
      - name: Download current benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BENCHMARK_ARTIFACT_NAME }}
          path: current-benchmark

      - name: Locate latest successful base branch benchmark run
        id: find-baseline
        uses: actions/github-script@v7
        with:
          script: |
            const workflow_id = 'index-benchmark.yml';
            const baseRef = context.payload.pull_request.base.ref;
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id,
              branch: baseRef,
              event: 'push',
              status: 'completed',
              per_page: 50,
            });

            const baselineRun = runs.find(run => run.conclusion === 'success');
            if (!baselineRun) {
              core.info(`No successful benchmark workflow runs found for base branch ${baseRef}`);
              core.setOutput('run_id', '');
              return;
            }

            core.info(`Using baseline run ${baselineRun.id} on ${baselineRun.head_branch}`);
            core.setOutput('run_id', String(baselineRun.id));

      - name: Download base branch benchmark artifact
        if: steps.find-baseline.outputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BENCHMARK_ARTIFACT_NAME }}
          path: baseline-benchmark
          repository: ${{ github.repository }}
          run-id: ${{ steps.find-baseline.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Render comparison summary
        id: render-comparison
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function loadJson(path) {
              if (!fs.existsSync(path)) {
                return null;
              }
              return JSON.parse(fs.readFileSync(path, 'utf8'));
            }

            function msToSeconds(valueMs) {
              return valueMs / 1000.0;
            }

            const current = loadJson('current-benchmark/java-index-benchmark.json');
            if (!current) {
              core.setFailed('Current benchmark artifact is missing');
              return;
            }

            const baseline = loadJson('baseline-benchmark/java-index-benchmark.json');
            const currentSeconds = msToSeconds(current.reindex_duration_ms);
            const lines = [
              '## Index Benchmark',
              `- Current branch full reindex: \`${currentSeconds.toFixed(2)}s\``,
              `- Indexed files: \`${current.indexed_files}\``,
              `- Benchmark repo: \`${current.repo_url} @ ${current.checked_out_commit}\``,
            ];

            if (baseline) {
              const baselineSeconds = msToSeconds(baseline.reindex_duration_ms);
              const deltaSeconds = currentSeconds - baselineSeconds;
              const deltaPct = baselineSeconds === 0 ? 0.0 : (deltaSeconds / baselineSeconds) * 100.0;
              const direction = deltaSeconds > 0 ? 'slower' : 'faster';
              lines.push(`- Base branch full reindex: \`${baselineSeconds.toFixed(2)}s\``);
              lines.push(`- Delta vs base: \`${deltaSeconds >= 0 ? '+' : ''}${deltaSeconds.toFixed(2)}s\` (\`${deltaPct >= 0 ? '+' : ''}${deltaPct.toFixed(2)}%\`, ${direction})`);
            } else {
              lines.push('- Base branch full reindex: `unavailable`');
              lines.push('- Delta vs base: `unavailable`');
            }

            lines.push(`- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`);

            core.setOutput('report', lines.join('\n'));

      - name: Add comparison summary to job summary
        run: |
          printf '%s\n' "${{ steps.render-comparison.outputs.report }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Update PR description with benchmark comparison
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.render-comparison.outputs.report }}
        with:
          script: |
            const markerStart = '<!-- index-benchmark:start -->';
            const markerEnd = '<!-- index-benchmark:end -->';
            const reportBlock = `${markerStart}\n${process.env.REPORT}\n${markerEnd}`;
            const pull_number = context.payload.pull_request.number;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
            });

            const currentBody = pullRequest.body || '';
            const markerRegex = new RegExp(`${markerStart}[\\s\\S]*?${markerEnd}`, 'm');
            const nextBody = markerRegex.test(currentBody)
              ? currentBody.replace(markerRegex, reportBlock)
              : `${currentBody.trimEnd()}\n\n${reportBlock}`.trim();

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
              body: nextBody,
            });
